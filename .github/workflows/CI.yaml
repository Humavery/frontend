# Configuration of the CI workflow for the frontend application.
---
name: Validate frontend's application code quality & try to build the application.
on:
    push:
    pull_request:
permissions:
    contents: read
defaults:
    run:
        shell: bash
jobs:
    validate-code-quality:
        name: Validate frontend's application code quality.
        runs-on: ubuntu-latest
        env:
            NODE_ENV: CI

            # Every single environment variable needs to be set in order to make the application work correctly.
            # CI also should follow this standard, even though it's not required for CI (NODE_ENV == "CI").

        steps:
            - name: Checkout repository.
              uses: actions/checkout@v6

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies.
              run: bun install --frozen-lockfile

            - name: Check formatting of files using Prettier.
              run: bun run format:check

            - name: Check linting of files using ESLint.
              run: bun run lint:fix

            - name: Check linting of Dockerfile using Hadolint.
              uses: hadolint/hadolint-action@v3.3.0
              with:
                  Dockerfile: Dockerfile

            - name: Build a production version of the application.
              run: bun run build
