---
services:
    frontend-app:
        container_name: humavery-frontend
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_PORT: ${APP_PORT:-3000}
        env_file:
            - .env
        environment:
            NODE_ENV: ${NODE_ENV:-production}
        ports:
            - "${APP_PORT:-3000}:3000"
        healthcheck:
            test: ["CMD", "bun", "run", "healthcheck"]
            interval: 30s
            timeout: 10s
